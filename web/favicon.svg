<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="oc-retry-watchdog">
  <title>oc-retry-watchdog</title>
  <!-- Rounded square backdrop in the dashboard accent color so the
       glyph stays legible at 16x16 against any browser-tab background. -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="#1a4f7a"/>
  <!-- Circular retry arrow (the "watch + retry" concept). Drawn as a
       stroked arc with a triangular head, in white so it has high
       contrast against the accent backdrop. -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round">
    <path d="M 50 22 A 20 20 0 1 0 52 36" />
  </g>
  <polygon points="50,8 50,28 38,18" fill="#ffffff"/>
  <!-- Small green "ok" pulse dot in the eye/center -- represents a
       healthy run after retry. -->
  <circle cx="32" cy="32" r="6" fill="#2e7d32"/>
</svg>
